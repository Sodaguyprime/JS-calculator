<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Calculator</title>
        <link rel="stylesheet" href="styles/styles.css" />
    </head>
    <body>
      <main class="calculator" aria-label="Calculator">
        <section class="display-panel" aria-label="Display">
          <div class="display-expression" id="expression" aria-live="polite" aria-label="Expression"></div>
          <output id="display-area" class="display-value" aria-live="polite" aria-label="Current value">0</output>
        </section>

        <section class="keypad" aria-label="Keypad">

          <div class="keypad-row">
            <button onclick="clearAll()" class="key key--wide key--utility" aria-label="Clear">AC</button>
            <button  onclick="backspace()" class="key key--utility" aria-label="Backspace">⌫</button>
            <button onclick="setOperator('/')" class="key key--operator" aria-label="Divide">÷</button>
          </div>

          <div class="keypad-row">
            <button onclick="inputNum('7')" class="key key--digit" aria-label="7">7</button>
            <button onclick="inputNum('8')" class="key key--digit" aria-label="8">8</button>
            <button onclick="inputNum('9')" class="key key--digit" aria-label="9">9</button>
            <button onclick="setOperator('*')" class="key key--operator" aria-label="Multiply">×</button>
          </div>

          <div class="keypad-row">
            <button onclick="inputNum('4')" class="key key--digit" aria-label="4">4</button>
            <button onclick="inputNum('5')" class="key key--digit" aria-label="5">5</button>
            <button onclick="inputNum('6')" class="key key--digit" aria-label="6">6</button>
            <button onclick="setOperator('-')" class="key key--operator" aria-label="Subtract">−</button>
          </div>

          <div class="keypad-row">
            <button onclick="inputNum('1')" class="key key--digit" aria-label="1">1</button>
            <button onclick="inputNum('2')" class="key key--digit" aria-label="2">2</button>
            <button onclick="inputNum('3')" class="key key--digit" aria-label="3">3</button>
            <button onclick="setOperator('+')" class="key key--operator" aria-label="Add">+</button>
          </div>

          <div class="keypad-row">
            <button onclick="inputNum('0')" class="key key--digit key--wide" aria-label="0">0</button>
            <button onclick="inputDecimal()" class="key key--digit" aria-label="Decimal point" id="decimal-btn">.</button>
            <button onclick="calculate()" class="key key--equals" aria-label="Equals">=</button>
          </div>

        </section>
      </main>
      <script src="./scripts/main.js"></script>
    </body>
</html>
